services:
  # ─────────────────────────────────────────────────────────────
  # 1. Kafka Setup (permissions fix before broker starts)
  # ─────────────────────────────────────────────────────────────
  recsys-kafka-setup:
    image: alpine
    command: chown -R 1000:1000 /tmp/kraft-combined-logs
    volumes:
      - recsys-kafka-data:/tmp/kraft-combined-logs

  # ─────────────────────────────────────────────────────────────
  # 2. Kafka Broker (KRaft mode — no ZooKeeper)
  # ─────────────────────────────────────────────────────────────
  recsys-kafka:
    image: confluentinc/cp-kafka:7.9.3
    container_name: recsys-kafka
    depends_on:
      recsys-kafka-setup:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2QA"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@recsys-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - recsys-kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 3. Qdrant Vector Database  (HNSW-indexed Dense Embeddings)
  # ─────────────────────────────────────────────────────────────
  recsys-qdrant:
    image: qdrant/qdrant:latest
    container_name: recsys-qdrant
    ports:
      - "6333:6333"    # REST + gRPC client
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 4. FastAPI AI Agent Backend  (Hybrid RecSys Engine)
  # ─────────────────────────────────────────────────────────────
  recsys-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: recsys-backend
    depends_on:
      recsys-qdrant:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      QDRANT_HOST: recsys-qdrant
      QDRANT_PORT: "6333"
      KAFKA_BOOTSTRAP: recsys-kafka:9092
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      PORT: "5001"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./src:/app/src:ro
      - ./backend:/app/backend:ro
      - ./kafka_streaming:/app/kafka_streaming:ro
      - ./data_processing_pipeline:/app/data_processing_pipeline:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─────────────────────────────────────────────────────────────
  # 5. React Frontend  (Vite dev server with HMR)
  # ─────────────────────────────────────────────────────────────
  recsys-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: recsys-ui
    depends_on:
      recsys-backend:
        condition: service_healthy
    ports:
      - "3005:3005"
    environment:
      - VITE_API_HOST=recsys-backend
      - VITE_API_PORT=5001
    volumes:
      - ./frontend/src:/app/src:ro

volumes:
  recsys-kafka-data:
  qdrant_data:
